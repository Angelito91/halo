# ── LLVM setup — Windows (download pre-built 7z) ─────────────────────────
- name: Get latest LLVM 21 version (Windows)
  if: runner.os == 'Windows'
  id: llvm-version
  shell: pwsh
  run: |
    $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/llvm/llvm-project/releases"
    $latest21 = $releases | Where-Object { $_.tag_name -like "llvmorg-21.*" } | Select-Object -First 1
    if (-not $latest21) {
      Write-Error "No LLVM 21 release found"
      exit 1
    }
    $version = $latest21.tag_name -replace 'llvmorg-', ''
    Write-Host "Latest LLVM 21 version: $version"
    echo "version=$version" >> $env:GITHUB_OUTPUT
- name: Download and extract LLVM 21 (Windows)
  if: runner.os == 'Windows'
  shell: pwsh
  run: |
    $version = "${{ steps.llvm-version.outputs.version }}"
    $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$version/LLVM-$version-win64.7z"
    $archive = "$env:TEMP\LLVM-$version-win64.7z"
    Write-Host "Downloading LLVM $version from $url"
    Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
    Write-Host "Extracting to C:\LLVM ..."
    # Ensure target directory exists and is empty
    Remove-Item -Path C:\LLVM -Recurse -Force -ErrorAction SilentlyContinue
    New-Item -ItemType Directory -Path C:\LLVM -Force | Out-Null
    # 7z is preinstalled on GitHub Windows runners
    7z x $archive -oC:\LLVM -aoa | Out-Null
    Write-Host "Verifying..."
    if (-not (Test-Path "C:\LLVM\bin\llvm-config.exe")) {
      Write-Error "llvm-config.exe not found after extraction."
      exit 1
    }
    $ver = & "C:\LLVM\bin\llvm-config.exe" --version
    Write-Host "Installed LLVM $ver"
- name: Set LLVM env (Windows)
  if: runner.os == 'Windows'
  shell: pwsh
  run: |
    $llvm = "C:\LLVM"
    Add-Content $env:GITHUB_ENV "LLVM_SYS_211_PREFIX=$llvm"
    Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=$llvm\lib"
    Add-Content $env:GITHUB_PATH "$llvm\bin"
